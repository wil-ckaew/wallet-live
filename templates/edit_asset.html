<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Asset - Wallet Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 shadow-2xl max-w-md w-full">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white">Edit Asset</h1>
            <p class="text-gray-400 text-sm mt-1">Update asset information</p>
        </div>
        
        <form method="POST" action="/assets/{{ asset.id }}/edit" class="space-y-5">
            <div>
                <label class="block text-sm text-white/50 mb-1.5">Asset Name</label>
                <input 
                    type="text" 
                    name="name" 
                    value="{{ asset.name }}"
                    placeholder="e.g., Ethereum" 
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400/50 focus:shadow-[0_0_15px_rgba(34,211,238,0.15)] transition-all duration-300"
                >
            </div>
            
            <div>
                <label class="block text-sm text-white/50 mb-1.5">Unit Value ($)</label>
                <input 
                    type="number" 
                    step="0.01" 
                    name="unit_value" 
                    value="{{ asset.unit_value }}"
                    placeholder="0.00" 
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400/50 focus:shadow-[0_0_15px_rgba(34,211,238,0.15)] transition-all duration-300"
                >
            </div>
            
            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 px-4 py-2.5 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-medium hover:shadow-[0_0_25px_rgba(34,211,238,0.4)] transition-all duration-300 transform hover:scale-[1.02]">
                    💾 Update Asset
                </button>
                <a href="/assets" class="flex-1 px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-center text-white/70 hover:bg-white/10 hover:text-white transition-all duration-300">
                    Cancel
                </a>
            </div>
        </form>
        
        <div class="mt-6 pt-6 border-t border-white/10">
            <form method="POST" action="/assets/{{ asset.id }}/delete" onsubmit="return confirm('Are you sure you want to delete this asset?')">
                <button type="submit" class="w-full px-4 py-2.5 bg-red-500/20 border border-red-500/30 rounded-xl text-red-400 hover:bg-red-500/30 transition-all duration-300">
                    🗑️ Delete Asset
                </button>
            </form>
        </div>
    </div>
</body>
</html>
