<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Wallet Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .glass-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }
        .message-user {
            background: rgba(34, 211, 238, 0.15);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 12px 12px 0 12px;
            padding: 10px 16px;
            max-width: 75%;
            margin-left: auto;
        }
        .message-assistant {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px 12px 12px 0;
            padding: 10px 16px;
            max-width: 75%;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .avatar-user {
            background: rgba(34, 211, 238, 0.2);
            border: 1px solid rgba(34, 211, 238, 0.3);
        }
        .avatar-assistant {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: typing 1.4s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-container {
            height: calc(100vh - 280px);
            min-height: 400px;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .btn-send {
            background: linear-gradient(135deg, #06b6d4, #8b5cf6);
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-send:hover {
            box-shadow: 0 0 30px rgba(34,211,238,0.3);
            transform: scale(1.02);
        }
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        input:focus {
            outline: none;
        }
        .quick-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .quick-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen text-white">
    <!-- Hidden input para passar o userId -->
    <input type="hidden" id="userId" value="{{ user.id() }}">

    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                    🤖 AI Chat
                </h1>
                <p class="text-gray-400 text-sm">Seu assistente de investimentos</p>
            </div>
            <div class="flex gap-2">
                <a href="/" class="glass-card px-4 py-2 rounded-xl text-sm hover:bg-white/10 transition-all duration-300">🏠 Home</a>
                <a href="/dashboard" class="glass-card px-4 py-2 rounded-xl text-sm hover:bg-white/10 transition-all duration-300">📊 Dashboard</a>
                <a href="/assets" class="glass-card px-4 py-2 rounded-xl text-sm hover:bg-white/10 transition-all duration-300">💰 Assets</a>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatMessages" class="glass-card rounded-2xl p-4 chat-container overflow-y-auto scrollbar-hide">
            <div id="messagesContainer" class="space-y-3">
                <!-- Welcome Message -->
                <div class="flex items-start gap-3 fade-in" id="welcomeMessage">
                    <div class="message-avatar avatar-assistant flex-shrink-0">🤖</div>
                    <div class="message-assistant">
                        <p class="text-sm text-gray-300">Olá! Sou seu assistente de investimentos. 👋</p>
                        <p class="text-xs text-gray-500 mt-1">Pergunte-me sobre Bitcoin, Ethereum, investimentos e tendências do mercado!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area - SEM FORMULÁRIO -->
        <div class="glass-card rounded-2xl p-4 mt-4">
            <div class="flex gap-3">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Digite sua mensagem..."
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-cyan-400/50 focus:shadow-[0_0_15px_rgba(34,211,238,0.15)] transition-all duration-300"
                    autocomplete="off"
                >
                <button
                    id="sendButton"
                    class="px-6 py-3 btn-send rounded-xl font-medium transition-all duration-300"
                >
                    Enviar
                </button>
            </div>
            <div class="flex gap-2 mt-3 flex-wrap">
                <button onclick="sendQuickMessage('Como está o Bitcoin hoje?')" class="quick-btn text-xs glass-card px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">₿ Bitcoin</button>
                <button onclick="sendQuickMessage('Qual a tendência do Ethereum?')" class="quick-btn text-xs glass-card px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">⟠ Ethereum</button>
                <button onclick="sendQuickMessage('Devo investir agora?')" class="quick-btn text-xs glass-card px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">📈 Investir</button>
                <button onclick="sendQuickMessage('Me dicas sobre carteira')" class="quick-btn text-xs glass-card px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">💼 Carteira</button>
                <button onclick="sendQuickMessage('Qual moeda investir?')" class="quick-btn text-xs glass-card px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">💰 Moeda</button>
                <button onclick="sendQuickMessage('Ajuda')" class="quick-btn text-xs glass-card px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors">❓ Ajuda</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userIdInput = document.getElementById('userId');
            if (!userIdInput) {
                console.error('Elemento userId não encontrado!');
                return;
            }
            const userId = parseInt(userIdInput.value);
            
            console.log('Chat inicializado - User ID:', userId);

            const chatMessages = document.getElementById('chatMessages');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');

            // Função para enviar mensagem
            async function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) return;
                
                console.log('Enviando mensagem:', message);
                
                // Adiciona mensagem do usuário
                addMessage('user', message);
                messageInput.value = '';
                messageInput.disabled = true;
                sendButton.disabled = true;
                
                showTyping();
                
                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'include',
                        body: JSON.stringify({
                            message: message,
                            user_id: userId
                        }),
                    });
                    
                    console.log('Status da resposta:', response.status);
                    
                    if (!response.ok) {
                        throw new Error('HTTP error! status: ' + response.status);
                    }
                    
                    const data = await response.json();
                    console.log('Resposta recebida:', data);
                    
                    hideTyping();
                    addMessage('assistant', data.message, data.timestamp);
                    
                } catch (error) {
                    console.error('Erro:', error);
                    hideTyping();
                    addMessage('assistant', 'Desculpe, tive um problema. Tente novamente mais tarde. 🙏');
                }
                
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }

            // Função para mensagens rápidas
            window.sendQuickMessage = function(text) {
                messageInput.value = text;
                sendMessage();
            };

            // Função para adicionar mensagem ao chat
            function addMessage(role, content, timestamp = null) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'flex items-start gap-3 fade-in';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar flex-shrink-0 ' + (role === 'user' ? 'avatar-user' : 'avatar-assistant');
                avatar.textContent = role === 'user' ? '👤' : '🤖';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = role === 'user' ? 'message-user' : 'message-assistant';
                
                const text = document.createElement('p');
                text.className = 'text-sm text-gray-200 whitespace-pre-wrap';
                text.textContent = content;
                contentDiv.appendChild(text);
                
                if (timestamp) {
                    const time = document.createElement('p');
                    time.className = 'text-xs text-gray-500 mt-1';
                    const date = new Date(timestamp);
                    time.textContent = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    contentDiv.appendChild(time);
                }
                
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
                messagesContainer.appendChild(messageDiv);
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // Função para mostrar indicador de digitação
            function showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typingIndicator';
                typingDiv.className = 'flex items-start gap-3 fade-in';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar avatar-assistant flex-shrink-0';
                avatar.textContent = '🤖';
                
                const content = document.createElement('div');
                content.className = 'message-assistant py-3 px-4';
                content.innerHTML = `
                    <div class="flex gap-1">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                `;
                
                typingDiv.appendChild(avatar);
                typingDiv.appendChild(content);
                messagesContainer.appendChild(typingDiv);
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function hideTyping() {
                const typing = document.getElementById('typingIndicator');
                if (typing) typing.remove();
            }

            // Evento de clique no botão Enviar
            sendButton.addEventListener('click', sendMessage);

            // Evento para a tecla Enter
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Foco no input ao carregar
            messageInput.focus();
            console.log('Chat pronto para uso!');
            console.log('Pressione Enter para enviar ou clique no botão Enviar');
        });
    </script>
</body>
</html>
