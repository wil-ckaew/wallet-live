<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ asset.name }} - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .profit { color: #34d399; }
        .loss { color: #f87171; }
    </style>
</head>
<body class="min-h-screen p-6 text-white">
    <div class="container mx-auto max-w-4xl">
        <div class="flex justify-between items-center mb-8">
            <div>
                <a href="/dashboard" class="text-cyan-400 hover:text-cyan-300 transition-colors">← Back to Dashboard</a>
                <h1 class="text-3xl font-bold text-white mt-2">{{ asset.name }}</h1>
            </div>
            <a href="/assets" class="px-5 py-2.5 bg-cyan-500/20 border border-cyan-400/30 rounded-xl text-cyan-400 hover:bg-cyan-500/30 transition-all duration-300">
                📊 Assets
            </a>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card rounded-2xl p-6">
                <p class="text-gray-400 text-sm">Current Price</p>
                <p class="text-2xl font-bold text-white">${{ asset.unit_value }}</p>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <p class="text-gray-400 text-sm">Quantity Owned</p>
                <p class="text-2xl font-bold text-white">{{ asset.quantity_owned }}</p>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <p class="text-gray-400 text-sm">Total Change</p>
                <p class="text-2xl font-bold {% if asset.value_delta >= 0.0 %}profit{% else %}loss{% endif %}">
                    {% if asset.value_delta >= 0.0 %}+{% endif %}${{ asset.value_delta }}
                </p>
            </div>
        </div>

        <!-- Chart -->
        {% if !chart_html.is_empty() %}
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-xl font-semibold mb-4">📊 Price Chart</h2>
            <div class="chart-container">
                {{ chart_html|safe }}
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
